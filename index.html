<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가맹점 오픈 체크리스트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#a8a8a0;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --green:#1D9E75;--green-light:#E1F5EE;--green-mid:#9FE1CB;
  --orange:#D85A30;--orange-light:#FAECE7;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --hq:#185FA5;--hq-light:#dbeeff;--hq-bar:#85B7EB;
  --owner:#3B6D11;--owner-light:#EAF3DE;--owner-bar:#97C459;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}

/* ── TOP NAV ── */
.top-nav{display:flex;align-items:center;gap:0;background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.25rem;position:sticky;top:0;z-index:100}
.nav-logo{font-size:14px;font-weight:600;color:var(--text);padding:0 1rem 0 0;margin-right:1rem;border-right:1px solid var(--border)}
.nav-store{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.nav-store input{font-size:13px;border:none;background:transparent;color:var(--text);width:130px;outline:none;font-weight:500}
.nav-store input:focus{border-bottom:1px solid var(--green)}
.nav-tabs{display:flex;margin-left:auto;gap:0}
.nav-tab{font-size:13px;padding:14px 16px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500}

/* ── GLOBAL PROGRESS ── */
.prog-bar-wrap{height:3px;background:var(--bg3)}
.prog-bar-fill{height:100%;background:var(--green);transition:width .3s}
.cat-progress-bar{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 1.5rem;gap:12px;align-items:center;flex-wrap:wrap}
.cat-prog-item{display:flex;align-items:center;gap:8px;flex:1;min-width:160px}
.cat-prog-label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:80px}
.cat-prog-track{flex:1;height:7px;background:rgba(220,80,60,0.15);border-radius:99px;overflow:hidden}
.cat-prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .35s}
.cat-prog-pct{font-size:11px;font-weight:500;color:var(--text2);min-width:28px;text-align:right}

/* ── PAGE WRAPPER ── */
.page{display:none;padding:1.5rem 4rem}.page.active{display:block}

/* ── CHECKLIST LAYOUT ── */
.checklist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.checklist-header h2{font-size:16px;font-weight:500}
.prog-label{font-size:12px;color:var(--text2)}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;max-width:760px;margin-left:auto;margin-right:auto}
.subtab{font-size:12px;padding:5px 14px;border-radius:99px;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--bg);transition:all .15s}
.subtab.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.subtab-cnt{font-size:11px;opacity:.75;margin-left:3px}
.section{margin-bottom:1.25rem}
.sec-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:var(--radius);border:1px solid rgba(220,80,60,0.18);margin-bottom:5px;cursor:pointer;background:rgba(250,235,235,0.55);transition:background .12s,border-color .12s}
.item:hover{background:rgba(240,200,200,0.4)}
.item.done:hover{background:rgba(200,235,220,0.6)}
.item.done{background:rgba(225,245,238,0.7);border-color:rgba(29,158,117,0.25);opacity:1}
.item.done .item-label{text-decoration:line-through;color:var(--text3)}
.item.important{border-color:var(--orange);background:rgba(250,235,235,0.7)}
.item.opt-item{border-style:dashed;background:rgba(247,247,245,0.8);border-color:rgba(0,0,0,0.12)}
.chk{width:18px;height:18px;min-width:18px;border-radius:5px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;flex-shrink:0}
.chk.checked{background:var(--green);border-color:var(--green)}
.chk.checked::after{content:'';display:block;width:5px;height:9px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.item-label{font-size:13.5px;line-height:1.4}
.item-note{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;padding:2px 8px;border-radius:99px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.bw{background:var(--amber-light);color:var(--amber)}
.br{background:var(--orange-light);color:var(--orange)}
.bi{background:var(--blue-light);color:var(--blue)}
.bg{background:var(--green-light);color:var(--green)}
.bm{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.checklist-inner{max-width:760px;margin:0 auto}.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.stat-n{font-size:20px;font-weight:500}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}
.info-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-top:6px}
.info-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.info-row:last-child{margin-bottom:0}
.info-lbl{font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;min-width:90px}
.info-inp{font-size:13px;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;background:var(--bg);flex:1;min-width:0;color:var(--text)}
.info-inp:focus{outline:none;border-color:var(--green)}
.edu-inp{font-size:13px;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;background:var(--bg);width:160px;color:var(--text)}
.edu-inp:focus{outline:none;border-color:var(--green)}
.type-selector{display:flex;gap:8px;margin-top:8px}
.type-btn{font-size:13px;padding:6px 16px;border-radius:99px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2)}
.type-btn.sel-corp{background:var(--blue-light);border-color:var(--blue);color:var(--blue);font-weight:500}
.type-btn.sel-indiv{background:var(--green-light);border-color:var(--green);color:var(--green);font-weight:500}
.type-hint{font-size:12px;color:var(--text2);margin-top:6px;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)}
.toggle-row{display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)}
.tgl-lbl{font-size:12px;color:var(--text2)}
.tgl-sw{position:relative;width:36px;height:20px;flex-shrink:0}
.tgl-sw input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border2);border-radius:20px;transition:.2s}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
input:checked+.slider{background:var(--green)}
input:checked+.slider:before{transform:translateX(16px)}
.sub-indent{margin-left:20px;border-left:2px solid var(--green);padding-left:0;margin-top:4px}
.opt-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--bg2);color:var(--text3);border:1px solid var(--border);margin-left:auto;white-space:nowrap;flex-shrink:0}

/* ── GANTT ── */
.gantt-page{max-width:100%}
.gantt-ctrl{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;max-width:480px}
.ctrl-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-lbl{font-size:12px;color:var(--text2);white-space:nowrap;min-width:56px}
.ctrl-row input[type=date]{font-size:13px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text)}
.ctrl-row input[type=date]:focus{outline:none;border-color:var(--green)}
.htag{font-size:12px;padding:3px 8px;border-radius:99px;background:var(--amber-light);color:var(--amber);display:flex;align-items:center;gap:4px}
.htag button{background:none;border:none;cursor:pointer;color:var(--amber);font-size:14px;line-height:1;padding:0}
.holiday-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.add-hol{font-size:12px;padding:3px 10px;border:1px dashed var(--border2);border-radius:99px;background:transparent;color:var(--text2);cursor:pointer}
.add-hol:hover{background:var(--bg2)}
.gantt-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:.75rem}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.gantt-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
.capture-btn{font-size:13px;padding:7px 18px;border-radius:99px;background:var(--green);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500}
.capture-btn:hover{opacity:.88}
.gantt-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
#capture-target{background:var(--bg)}
.capture-store-label{font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px;display:none}
.gt .th-dt.open-col{background:#E24B4A !important;color:#fff !important;font-weight:700}
.gt .td-cell.open-col{background:#FCEBEB !important}
.gt .th-dt.open-col span{color:#ffcccc}
table.gt{border-collapse:collapse;min-width:100%;font-size:11.5px}
.gt th,.gt td{border:1px solid var(--border);padding:0}
.gt .th-lbl{padding:4px 8px;font-size:11px;font-weight:500;color:var(--text2);background:var(--bg2);white-space:nowrap}
.gt .th-dt{width:22px;min-width:22px;max-width:22px;text-align:center;background:var(--bg2);padding:3px 0;font-size:10px;color:var(--text2);vertical-align:bottom;line-height:1.3}
.gt .th-dt.hol{background:var(--amber-light);color:var(--amber)}
.gt .th-dt.wknd{background:var(--bg3);color:var(--text3)}
.gt .th-dt.tod{background:var(--blue-light);color:var(--blue);font-weight:500}
.gt .td-lbl{padding:3px 8px;font-size:11px;color:var(--text);background:var(--bg);white-space:nowrap}
.gt .td-lbl.open-row{background:var(--red-light);font-weight:500;color:var(--red)}
.gt tr:has(.td-lbl.open-row) .td-range{background:var(--red-light)}
.gt .td-cell{width:22px;min-width:22px;max-width:22px;height:26px;padding:2px 1px;background:var(--bg);vertical-align:middle}
.gt .td-cell.hol{background:var(--amber-light)}
.gt .td-cell.wknd{background:var(--bg3)}
.gt .td-cell.tod{background:var(--blue-light)}
.gt .td-range{padding:3px 8px;font-size:10.5px;color:var(--text2);background:var(--bg);white-space:nowrap;border-right:1px solid var(--border)}
.gt .th-range{padding:4px 8px;font-size:10.5px;font-weight:500;color:var(--text2);background:var(--bg2);white-space:nowrap;text-align:center;border-right:1px solid var(--border)}
.bar{height:18px;border-radius:3px;width:100%;cursor:pointer}
.bar-hq{background:var(--hq-bar)}
.bar-owner{background:var(--owner-bar)}
.bar-open{background:#E24B4A}
.gt tr:hover .td-lbl,.gt tr:hover .td-cell:not(.hol):not(.wknd):not(.tod){background:var(--bg2)}
.mth-hdr{text-align:center;background:var(--bg2);padding:4px 0;font-size:12px;font-weight:500;color:var(--text);border-bottom:1px solid var(--border)}
.sec-row td{background:var(--bg2);font-weight:600;color:var(--text2);font-size:11px;padding:4px 10px;letter-spacing:.04em;text-transform:uppercase}
.task-edit-panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1rem;margin-bottom:1rem}
.task-edit-panel h3{font-size:14px;font-weight:500;margin-bottom:12px;color:var(--text)}
.task-rows{display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto}
.task-row-edit{display:flex;align-items:center;gap:6px}
.task-row-edit .tname{font-size:12px;color:var(--text2);min-width:160px;max-width:220px}
.task-row-edit input[type=date]{font-size:12px;padding:3px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text);width:118px}
.task-row-edit select{font-size:12px;padding:3px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text)}
.who-hq{color:var(--hq)}
.who-owner{color:var(--owner)}
.empty-msg{padding:2rem;text-align:center;color:var(--text3);font-size:13px}

/* ── STORE TABS ── */
.store-tabs-bar{display:flex;align-items:center;gap:0;background:var(--bg);border-bottom:2px solid var(--border);padding:0 1.5rem}
.store-tab{font-size:13px;font-weight:500;padding:10px 20px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.store-tab:hover{color:var(--text);background:var(--bg2)}
.store-tab.active{color:var(--green);border-bottom-color:var(--green)}
.store-tab-edit{display:none;font-size:12px;border:none;background:transparent;color:var(--text);outline:none;width:80px;font-weight:500;padding:0}
.store-tab.active .store-tab-name{display:none}
.store-tab.active .store-tab-edit{display:inline}
.store-tab-del{font-size:13px;color:var(--text3);cursor:pointer;padding:0 2px;line-height:1;display:none}
.store-tab:hover .store-tab-del{display:inline}
.store-tab.active .store-tab-del{display:none}
.add-store-btn{font-size:12px;padding:6px 12px;color:var(--text3);cursor:pointer;border:none;background:transparent;display:flex;align-items:center;gap:4px;transition:color .15s}
.add-store-btn:hover{color:var(--green)}
.store-tab-prog{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--bg3);color:var(--text3);font-weight:400;margin-left:2px}
.store-tab.active .store-tab-prog{background:var(--green-light);color:var(--green)}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo"><i class="ti ti-building-store" style="vertical-align:-2px;margin-right:6px"></i>오픈 체크리스트</div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchPage(0)">📋 행정·서류</div>
    <div class="nav-tab" onclick="switchPage(1)">🏗️ 시설·물품</div>
    <div class="nav-tab" onclick="switchPage(2)">📣 마케팅·시스템</div>
    <div class="nav-tab" onclick="switchPage(3)">📦 발주 확인</div>
    <div class="nav-tab" onclick="switchPage(4)">📅 일정 차트</div>
  </div>
  <button onclick="resetAll()" style="font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;margin-left:12px;white-space:nowrap" title="이 지점 데이터 초기화"><i class="ti ti-refresh" style="font-size:12px;vertical-align:-1px"></i> 초기화</button>
</nav>
<div class="store-tabs-bar" id="store-tabs-bar"></div>
<div class="prog-bar-wrap"><div class="prog-bar-fill" id="prog-bar" style="width:0%"></div></div>
<div class="cat-progress-bar" id="cat-progress-bar">
  <div class="cat-prog-item">
    <span class="cat-prog-label">📋 행정·서류</span>
    <div class="cat-prog-track"><div class="cat-prog-fill" id="cpf-0" style="width:0%"></div></div>
    <span class="cat-prog-pct" id="cpp-0">0%</span>
  </div>
  <div class="cat-prog-item">
    <span class="cat-prog-label">🏗️ 시설·물품</span>
    <div class="cat-prog-track"><div class="cat-prog-fill" id="cpf-1" style="width:0%"></div></div>
    <span class="cat-prog-pct" id="cpp-1">0%</span>
  </div>
  <div class="cat-prog-item">
    <span class="cat-prog-label">📣 마케팅·시스템</span>
    <div class="cat-prog-track"><div class="cat-prog-fill" id="cpf-2" style="width:0%"></div></div>
    <span class="cat-prog-pct" id="cpp-2">0%</span>
  </div>
  <div class="cat-prog-item">
    <span class="cat-prog-label">📦 발주 확인</span>
    <div class="cat-prog-track"><div class="cat-prog-fill" id="cpf-3" style="width:0%"></div></div>
    <span class="cat-prog-pct" id="cpp-3">0%</span>
  </div>
</div>

<!-- ═══════════════ PAGE 0: 행정·서류 ═══════════════ -->
<div class="page active" id="page-0">
  <div class="subtabs" id="subtabs-0"></div>
  <div id="subcontent-0"></div>
</div>

<!-- ═══════════════ PAGE 1: 시설·물품 ═══════════════ -->
<div class="page" id="page-1">
  <div id="content-1"></div>
</div>

<!-- ═══════════════ PAGE 2: 마케팅·시스템 ═══════════════ -->
<div class="page" id="page-2">
  <div id="content-2"></div>
</div>

<!-- ═══════════════ PAGE 3: 발주확인 ═══════════════ -->
<div class="page" id="page-3">
  <div id="content-3"></div>
</div>

<!-- ═══════════════ PAGE 4: 일정 차트 ═══════════════ -->
<div class="page" id="page-4" style="padding:1.5rem 12rem">
  <!-- 차트 먼저 -->
  <div id="capture-target">
    <div class="capture-store-label" id="capture-store-label"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
      <div class="gantt-legend" style="margin-bottom:0">
        <div class="leg"><div class="leg-dot" style="background:var(--hq-bar)"></div>본사 진행</div>
        <div class="leg"><div class="leg-dot" style="background:var(--owner-bar)"></div>점주님 진행</div>
        <div class="leg"><div class="leg-dot" style="background:#E24B4A"></div>오픈일</div>
        <div class="leg"><div class="leg-dot" style="background:var(--bg3);border:1px solid var(--border)"></div>주말</div>
        <div class="leg"><div class="leg-dot" style="background:var(--amber-light);border:1px solid #FAC775"></div>공휴일</div>
        <div class="leg"><div class="leg-dot" style="background:var(--blue-light);border:1px solid #B5D4F4"></div>오늘</div>
      </div>
      <button class="capture-btn" onclick="captureGantt()">
        <i class="ti ti-camera" style="font-size:15px"></i> 이미지로 저장
      </button>
    </div>
    <div class="gantt-wrap" id="gantt-wrap"></div>
  </div>

  <!-- 설정 아래 -->
  <div style="margin-top:1.25rem;display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap">
    <div class="gantt-ctrl" style="flex:0 0 auto;min-width:320px">
      <div class="ctrl-row">
        <span class="ctrl-lbl">사전미팅</span>
        <input type="date" id="dt-start" value="2025-10-01" oninput="renderGantt()">
        <span class="ctrl-lbl" style="min-width:40px">오픈일</span>
        <input type="date" id="dt-end" value="2025-11-14" oninput="renderGantt()">
      </div>
      <div class="ctrl-row">
        <span class="ctrl-lbl">공휴일</span>
        <div class="holiday-tags" id="holiday-tags"></div>
        <input type="date" id="hol-input" style="font-size:12px;padding:3px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--bg2);color:var(--text)">
        <button class="add-hol" onclick="addHoliday()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px"></i> 추가</button>
      </div>

<script>
const TODAY=new Date();TODAY.setHours(0,0,0,0);
let storeName="ooo점";
let curPage=0, curSub=0;
let checked={};
let bizType="", signOfficialVendor=false, curtainYes=false;
let eduPeriod="";
let uniforms=[{u:"",g:""},{u:"",g:""},{u:"",g:""}];
let staff=[{name:"",phone:"",rank:""},{name:"",phone:"",rank:""},{name:"",phone:"",rank:""}];

const LS_META="franchise_meta_v1";
const MAX_STORES=3;
let curStoreIdx=0;

function defaultStoreState(name){
  return {
    storeName:name,checked:{},bizType:"",signOfficialVendor:false,curtainYes:false,
    eduPeriod:"",uniforms:[{u:"",g:""},{u:"",g:""},{u:"",g:""}],
    staff:[{name:"",phone:"",rank:""},{name:"",phone:"",rank:""},{name:"",phone:"",rank:""}]
  };
}

function getMeta(){
  try{const r=localStorage.getItem(LS_META);return r?JSON.parse(r):{stores:["1호점","2호점","3호점"],cur:0};}
  catch(e){return {stores:["1호점","2호점","3호점"],cur:0};}
}
function saveMeta(meta){try{localStorage.setItem(LS_META,JSON.stringify(meta));}catch(e){}}
function lsKey(idx){return "franchise_store_v1_"+idx;}

function saveState(){
  try{
    const s={storeName,checked,bizType,signOfficialVendor,curtainYes,eduPeriod,uniforms,staff};
    localStorage.setItem(lsKey(curStoreIdx),JSON.stringify(s));
    const meta=getMeta();
    meta.stores[curStoreIdx]=storeName;
    meta.cur=curStoreIdx;
    saveMeta(meta);
    renderStoreTabs();
  }catch(e){}
}

function loadStoreState(idx){
  try{
    const raw=localStorage.getItem(lsKey(idx));
    const meta=getMeta();
    if(raw){
      const s=JSON.parse(raw);
      storeName=s.storeName||meta.stores[idx]||("지점"+(idx+1));
      checked=s.checked||{};
      bizType=s.bizType||"";
      signOfficialVendor=!!s.signOfficialVendor;
      curtainYes=!!s.curtainYes;
      eduPeriod=s.eduPeriod||"";
      uniforms=s.uniforms||[{u:"",g:""},{u:"",g:""},{u:"",g:""}];
      staff=s.staff||[{name:"",phone:"",rank:""},{name:"",phone:"",rank:""},{name:"",phone:"",rank:""}];
    } else {
      const def=defaultStoreState(meta.stores[idx]||("지점"+(idx+1)));
      storeName=def.storeName;checked=def.checked;bizType=def.bizType;
      signOfficialVendor=def.signOfficialVendor;curtainYes=def.curtainYes;
      eduPeriod=def.eduPeriod;uniforms=def.uniforms;staff=def.staff;
    }
  }catch(e){}
}

function loadState(){
  const meta=getMeta();
  curStoreIdx=meta.cur||0;
  loadStoreState(curStoreIdx);
}

function switchStore(idx){
  curStoreIdx=idx;
  loadStoreState(idx);
  const meta=getMeta();meta.cur=idx;saveMeta(meta);
  curSub=0;
  renderStoreTabs();
  renderAll();
}

function renderStoreTabs(){
  const meta=getMeta();
  const bar=document.getElementById("store-tabs-bar");
  if(!bar) return;
  const totalItems=allCheckable().length;
  let html="";
  for(let i=0;i<MAX_STORES;i++){
    // 각 지점 진행도 계산
    let pct=0;
    try{
      const raw=localStorage.getItem(lsKey(i));
      if(raw){
        const s=JSON.parse(raw);
        const ck=s.checked||{};
        const tmpChecked=checked;
        checked=ck;
        const items=allCheckable();
        const done=items.filter(x=>ck[x.id]).length;
        pct=items.length?Math.round(done/items.length*100):0;
        checked=tmpChecked;
      }
    }catch(e){}
    const name=meta.stores[i]||("지점"+(i+1));
    const isActive=i===curStoreIdx;
    const curVal=isActive?storeName:name;
    html+=`<div class="store-tab${isActive?" active":""}" onclick="switchStore(${i})">
      <i class="ti ti-map-pin" style="font-size:12px;color:${isActive?"var(--green)":"var(--text3)"}"></i>
      <span class="store-tab-name">${name}</span>
      <input class="store-tab-edit" value="${curVal}" oninput="renameStore(${i},this.value)" onclick="event.stopPropagation()" placeholder="지점명">
      <span class="store-tab-prog">${pct}%</span>
    </div>`;
  }
  html+=`<button class="add-store-btn" style="display:none"></button>`;
  bar.innerHTML=html;
  if(curStoreIdx<MAX_STORES){
    const activeInput=bar.querySelector(".store-tab.active .store-tab-edit");
    if(activeInput) activeInput.value=storeName;
  }
}

function renameStore(idx,val){
  if(idx===curStoreIdx) {storeName=val;saveState();}
  else{
    const meta=getMeta();
    meta.stores[idx]=val;
    saveMeta(meta);
    renderStoreTabs();
  }
}

function allCheckable(){
  let items=[];
  SUBTABS_0.forEach(s=>s.sections.forEach(sec=>{
    if(sec.extra==="bizType") getCardDocs().forEach(i=>items.push(i));
    else (sec.items||[]).forEach(i=>{if(!i.optional)items.push(i);});
  }));
  [SECTIONS_1,SECTIONS_2,SECTIONS_3].forEach(pg=>pg.forEach(sec=>{
    if(sec.extra==="bizType") getCardDocs().forEach(i=>items.push(i));
    else (sec.items||[]).forEach(i=>{if(!i.optional)items.push(i);});
    if(sec.extra==="sign"&&signOfficialVendor) signSubItems().forEach(i=>items.push(i));
    if(sec.extra==="curtain"&&curtainYes) curtainSubItems().forEach(i=>items.push(i));
  }));
  return items;
}

function updateProgress(){
  const all=allCheckable();
  const done=all.filter(i=>checked[i.id]).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  document.getElementById('prog-bar').style.width=pct+'%';

  // 카테고리별 진행도
  const catDefs=[
    {subs:SUBTABS_0},
    {sections:SECTIONS_1},
    {sections:SECTIONS_2},
    {sections:SECTIONS_3},
  ];
  catDefs.forEach((cat,i)=>{
    let items=[];
    if(cat.subs){
      cat.subs.forEach(s=>s.sections.forEach(sec=>{
        if(sec.extra==="bizType") getCardDocs().forEach(x=>items.push(x));
        else (sec.items||[]).forEach(x=>{if(!x.optional)items.push(x);});
      }));
    } else {
      cat.sections.forEach(sec=>{
        if(sec.extra==="bizType") getCardDocs().forEach(x=>items.push(x));
        else (sec.items||[]).forEach(x=>{if(!x.optional)items.push(x);});
        if(sec.extra==="sign"&&signOfficialVendor) signSubItems().forEach(x=>items.push(x));
        if(sec.extra==="curtain"&&curtainYes) curtainSubItems().forEach(x=>items.push(x));
      });
    }
    const d=items.filter(x=>checked[x.id]).length;
    const p=items.length?Math.round(d/items.length*100):0;
    const fillEl=document.getElementById('cpf-'+i);
    const pctEl=document.getElementById('cpp-'+i);
    if(fillEl) fillEl.style.width=p+'%';
    if(pctEl){
      pctEl.textContent=p+'%';
      pctEl.style.color=p===100?'var(--green)':p>0?'var(--text2)':'rgba(200,80,60,0.7)';
    }
  });
}

function renderSections(sections,container){
  let html='<div class="checklist-inner">';
  const allSec=[];
  sections.forEach(sec=>{
    if(sec.extra==="bizType") getCardDocs().forEach(i=>allSec.push(i));
    else (sec.items||[]).forEach(i=>{if(!i.optional)allSec.push(i);});
  });
  const done=allSec.filter(i=>checked[i.id]).length;
  html+=`<div class="stats-row">
    <div class="stat"><div class="stat-n">${allSec.length}</div><div class="stat-l">전체</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${done}</div><div class="stat-l">완료</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--orange)">${allSec.length-done}</div><div class="stat-l">미완료</div></div>
  </div>`;
  for(const sec of sections){
    if(sec.corpOnly&&bizType!=="corp") continue;
    if(sec.extra==="bizType"){
      const docs=getCardDocs();
      const sd=docs.filter(i=>checked[i.id]).length;
      html+=`<div class="section"><div class="sec-title">사업자 유형 선택 <span style="font-weight:400;color:var(--text3);font-size:11px">${bizType?sd+'/'+docs.length:'미선택'}</span></div>
        <div class="item" style="cursor:default;display:block">${bizTypeBlock()}</div>`;
      if(bizType) docs.forEach(item=>{html+=renderItem(item);});
      html+=`</div>`;continue;
    }
    const secItems=sec.items||[];
    const sd=secItems.filter(i=>!i.optional&&checked[i.id]).length;
    const sc=secItems.filter(i=>!i.optional).length;
    html+=`<div class="section"><div class="sec-title">${sec.title} <span style="font-weight:400;color:var(--text3)">${sd}/${sc}</span></div>`;
    secItems.forEach(item=>{html+=renderItem(item);});
    if(sec.extra==="sign"&&signOfficialVendor){
      html+=`<div class="sub-indent">`;
      signSubItems().forEach(item=>{const ck=checked[item.id];html+=`<div class="item${ck?' done':''}" onclick="toggle('${item.id}',event)"><div class="chk${ck?' checked':''}"></div><div style="flex:1;min-width:0"><div class="item-label">${item.label}</div>${item.note?`<div class="item-note">${item.note}</div>`:''}</div></div>`;});
      html+=`</div>`;
    }
    if(sec.extra==="curtain"&&curtainYes){
      html+=`<div class="sub-indent">`;
      curtainSubItems().forEach(item=>{const ck=checked[item.id];html+=`<div class="item${ck?' done':''}" onclick="toggle('${item.id}',event)"><div class="chk${ck?' checked':''}"></div><div style="flex:1;min-width:0"><div class="item-label">${item.label}</div></div></div>`;});
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+='</div>';
  document.getElementById(container).innerHTML=html;
}

function dateAdd(base,days){const d=new Date(base);d.setDate(d.getDate()+days);return d;}
function fmt(d){return d.toISOString().slice(0,10);}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;}
function diffDays(a,b){return Math.round((b-a)/86400000);}

function renderTaskEditRows(){

      html+=`<div style="font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;padding:8px 0 2px">${t.section}</div>`;return;
    }
    const sDate=t.startDate||fmt(dateAdd(baseDate,t.offsetS));

    const whoLabel=t.who==='hq'?'본사':'점주';

        <option value="hq" ${t.who==='hq'?'selected':''}>본사</option>
        <option value="owner" ${t.who==='owner'?'selected':''}>점주</option>
      </select>
    </div>`;
  });
  rows.innerHTML=html;

function updateTaskDate(idx,se,val){

  else TASKS[idx].endDate=val;

function updateTaskWho(idx,who){TASKS[idx].who=who;renderGantt();}

function renderGantt(){
  const startVal=document.getElementById('dt-start').value;
  const endVal=document.getElementById('dt-end').value;
  if(!startVal||!endVal){document.getElementById('gantt-wrap').innerHTML='<div class="empty-msg">날짜를 설정해주세요.</div>';return;}
  const baseDate=parseDate(startVal);
  const endDate=parseDate(endVal);
  if(endDate<=baseDate){document.getElementById('gantt-wrap').innerHTML='<div class="empty-msg">오픈일이 사전미팅일보다 늦어야 합니다.</div>';return;}
  const totalDays=diffDays(baseDate,endDate)+1;

  const tags=document.getElementById('holiday-tags');
  tags.innerHTML=holidays.map(h=>`<span class="htag">${h.slice(5)} <button onclick="removeHoliday('${h}')" aria-label="삭제">&times;</button></span>`).join('');

  const openDateStr=endVal;
  const dates=[];
  for(let i=0;i<totalDays;i++){
    const d=dateAdd(baseDate,i);const ds=fmt(d);const dow=d.getDay();
    dates.push({d,ds,isWeekend:dow===0||dow===6,isHoliday:holidays.includes(ds),isToday:fmt(TODAY)===ds,isOpen:ds===openDateStr});
  }

  const months={};
  dates.forEach((info,i)=>{
    const mk=info.d.getFullYear()+'-'+(info.d.getMonth()+1);
    if(!months[mk]){months[mk]={label:(info.d.getMonth()+1)+'월',start:i,count:0};}
    months[mk].count++;
  });

  let html='<table class="gt" style="table-layout:auto">';
  html+='<colgroup>';
  html+='<col>';
  html+='<col style="white-space:nowrap">';
  dates.forEach(()=>{html+='<col style="width:22px;min-width:22px;max-width:22px">';});
  html+='</colgroup><thead><tr>';
  html+='<th class="th-lbl" rowspan="2" style="vertical-align:middle;text-align:left">작업 항목</th>';
  html+='<th class="th-range" rowspan="2" style="vertical-align:middle;text-align:center">기간</th>';
  Object.values(months).forEach(m=>{html+=`<th colspan="${m.count}" class="mth-hdr">${m.label}</th>`;});
  html+='</tr><tr>';
  dates.forEach(info=>{
    const cls=info.isOpen?'open-col':info.isHoliday?'hol':info.isWeekend?'wknd':info.isToday?'tod':'';
    html+=`<th class="th-dt${cls?' '+cls:''}">${info.d.getDate()}<br><span style="font-size:10px">${['일','월','화','수','목','금','토'][info.d.getDay()]}</span></th>`;
  });
  html+='</tr></thead><tbody>';

  TASKS.forEach(task=>{
    if(task.section){html+=`<tr class="sec-row"><td colspan="${totalDays+2}">${task.section}</td></tr>`;return;}
    const sDate=task.startDate?parseDate(task.startDate):dateAdd(baseDate,task.offsetS);
    const eDate=task.endDate?parseDate(task.endDate):dateAdd(baseDate,task.offsetE);
    const colS=Math.max(0,diffDays(baseDate,sDate));
    const colE=Math.min(totalDays-1,diffDays(baseDate,eDate));
    const rowCls=task.open?' open-row':'';
    const barCls=task.open?'bar bar-open':task.who==='hq'?'bar bar-hq':'bar bar-owner';
    const sLbl=fmt(sDate).slice(5).replace('-','/');
    const eLbl=fmt(eDate).slice(5).replace('-','/');
    const rangeStr=sLbl===eLbl?sLbl:sLbl+'~'+eLbl;
    html+=`<tr><td class="td-lbl${rowCls}">${task.label}</td><td class="td-range">${rangeStr}</td>`;
    let i=0;
    while(i<totalDays){
      const info=dates[i];
      const cls=info.isOpen?'open-col':info.isHoliday?'hol':info.isWeekend?'wknd':info.isToday?'tod':'';
      if(i===colS&&colE>=colS){
        const span=colE-colS+1;
        html+=`<td class="td-cell${cls?' '+cls:''}" colspan="${span}"><div class="${barCls}"></div></td>`;
        i=colE+1;
      } else {
        html+=`<td class="td-cell${cls?' '+cls:''}"></td>`;i++;
      }
    }
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('gantt-wrap').innerHTML=html;
  renderTaskEditRows();
}

  signOfficialVendor=def.signOfficialVendor;curtainYes=def.curtainYes;
  eduPeriod=def.eduPeriod;uniforms=def.uniforms;staff=def.staff;
  curSub=0;
  renderStoreTabs();
  renderAll();
}

async function captureGantt(){
  if(typeof html2canvas==='undefined'){alert('캡처 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const storeLbl=document.getElementById('capture-store-label');
  const sn=storeName||'ooo점';
  const endVal=document.getElementById('dt-end').value;
  storeLbl.textContent=sn+' 오픈 진행 일정표'+(endVal?' (오픈일: '+endVal.replace(/-/g,'.')+')'  :'');
  storeLbl.style.display='block';
  const target=document.getElementById('capture-target');
  const prevOverflow=target.style.overflow;
  const wrap=document.getElementById('gantt-wrap');
  const prevWrapOverflow=wrap.style.overflow;
  wrap.style.overflow='visible';
  target.style.overflow='visible';
  try{
    const canvas=await html2canvas(target,{
      scale:2,useCORS:true,
      width:target.scrollWidth,
      height:target.scrollHeight,
      windowWidth:target.scrollWidth+40,
      backgroundColor:'#ffffff'
    });
    const link=document.createElement('a');
    link.download=(sn+'_오픈일정표.png');
    link.href=canvas.toDataURL('image/png');
    link.click();
  }finally{
    storeLbl.style.display='none';
    wrap.style.overflow=prevWrapOverflow;
    target.style.overflow=prevOverflow;
  }
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
